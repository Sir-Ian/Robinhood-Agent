version: "2"
mode: STAGED_AUTONOMY
active_stage: PAPER
purpose: "Compatibility filename for the active five-task schedule. No scheduled task may place an order."

automations:
  morning_manager:
    schedule: "Mon-Fri 07:50 America/Chicago"
    model: gpt-5.4-mini
    reasoning: medium
    prompt_file: agentic-trading/prompts/morning_manager.md
    broker_access: read_only
    may_place_orders: false
    maximum_runtime_minutes: 40
  order_review:
    schedule: "Mon-Fri 08:45 America/Chicago"
    model: gpt-5.4
    reasoning: high
    prompt_file: agentic-trading/prompts/trade_executor_mvp.md
    broker_access: read_only_and_review_only
    may_place_orders: false
    maximum_runtime_minutes: 30
  end_of_day_sync:
    schedule: "Mon-Fri 15:15 America/Chicago"
    model: gpt-5.4-mini
    reasoning: medium
    prompt_file: agentic-trading/prompts/end_of_day_sync_mvp.md
    broker_access: read_only
    may_place_orders: false
    maximum_runtime_minutes: 45
  weekly_review:
    schedule: "Friday 16:15 America/Chicago"
    model: gpt-5.4
    reasoning: high
    prompt_file: agentic-trading/prompts/weekly_review_mvp.md
    broker_access: read_only
    may_place_orders: false
    maximum_runtime_minutes: 60
  public_report_publisher:
    schedule: "Friday 17:30 America/Chicago"
    model: gpt-5.4
    reasoning: high
    prompt_file: agentic-trading/prompts/public_report_publisher.md
    broker_access: none
    may_place_orders: false
    maximum_runtime_minutes: 45
